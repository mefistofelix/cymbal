name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Run tests
        run: CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" go test ./...

      - name: Build linux/amd64 (native)
        run: |
          CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" \
            GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o cymbal .
          tar czf cymbal_linux_amd64.tar.gz cymbal
          rm cymbal

      - name: Build linux/arm64 (zig cross)
        run: |
          go clean -cache

          cat > /tmp/zig-cc << 'EOF'
          #!/bin/sh
          exec zig cc -target aarch64-linux-gnu "$@"
          EOF
          chmod +x /tmp/zig-cc

          CC=/tmp/zig-cc CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" \
            GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w -linkmode=external -extld=/tmp/zig-cc" -o cymbal .
          tar czf cymbal_linux_arm64.tar.gz cymbal
          rm cymbal

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: cymbal_linux_*.tar.gz

  build-darwin:
    runs-on: macos-latest
    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" go test ./...

      - name: Build darwin/arm64 (native)
        run: |
          CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" \
            GOOS=darwin GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" -o cymbal .
          tar czf cymbal_darwin_arm64.tar.gz cymbal
          rm cymbal

      - name: Build darwin/amd64 (native cross)
        run: |
          CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" \
            GOOS=darwin GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o cymbal .
          tar czf cymbal_darwin_amd64.tar.gz cymbal
          rm cymbal

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-darwin
          path: cymbal_darwin_*.tar.gz

  release:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Rename and checksum
        run: |
          cd dist
          TAG=${{ steps.tag.outputs.tag }}
          for f in cymbal_*.tar.gz; do
            arch=$(echo "$f" | sed 's/cymbal_\(.*\)\.tar\.gz/\1/' | sed 's/amd64/x86_64/')
            mv "$f" "cymbal_${TAG}_${arch}.tar.gz"
          done
          sha256sum cymbal_*.tar.gz > checksums.txt
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/cymbal_*.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
