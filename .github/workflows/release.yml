name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            cross: true
          - runner: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: ${{ !matrix.cross }}
        run: CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" go test ./...

      - name: Build
        run: |
          EXT=""
          LDFLAGS="-s -w"
          CGO_FLAGS="-DSQLITE_ENABLE_FTS5"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
            LDFLAGS="$LDFLAGS -extldflags -static"
          fi
          if [ "${{ matrix.cross }}" = "true" ]; then
            CGO_FLAGS="$CGO_FLAGS -arch x86_64"
            export CGO_LDFLAGS="-arch x86_64"
          fi
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            CGO_CFLAGS="$CGO_FLAGS" \
            go build -trimpath -ldflags="$LDFLAGS" -o "cymbal${EXT}" .
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "cymbal_${{ matrix.goos }}_${{ matrix.goarch }}.zip" "cymbal${EXT}"
          else
            tar czf "cymbal_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" cymbal
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: cymbal_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            cymbal_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            cymbal_${{ matrix.goos }}_${{ matrix.goarch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Rename and checksum
        run: |
          cd dist
          TAG=${{ steps.tag.outputs.tag }}
          for f in cymbal_*.tar.gz; do
            [ -e "$f" ] || continue
            arch=$(echo "$f" | sed 's/cymbal_\(.*\)\.tar\.gz/\1/' | sed 's/amd64/x86_64/')
            mv "$f" "cymbal_${TAG}_${arch}.tar.gz"
          done
          for f in cymbal_*.zip; do
            [ -e "$f" ] || continue
            arch=$(echo "$f" | sed 's/cymbal_\(.*\)\.zip/\1/' | sed 's/amd64/x86_64/')
            mv "$f" "cymbal_${TAG}_${arch}.zip"
          done
          sha256sum cymbal_${TAG}_*.tar.gz cymbal_${TAG}_*.zip > checksums.txt
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/cymbal_*.tar.gz
            dist/cymbal_*.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        if: ${{ github.repository_owner == '1broseidon' && secrets.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          VERSION="${TAG#v}"
          cd dist

          SHA_DARWIN_ARM64=$(sha256sum cymbal_${TAG}_darwin_arm64.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_X86=$(sha256sum cymbal_${TAG}_darwin_x86_64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X86=$(sha256sum cymbal_${TAG}_linux_x86_64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum cymbal_${TAG}_linux_arm64.tar.gz | cut -d' ' -f1)

          cat > /tmp/cymbal.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          class Cymbal < Formula
            desc "Fast, language-agnostic code indexer and symbol navigator powered by tree-sitter"
            homepage "https://github.com/1broseidon/cymbal"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/1broseidon/cymbal/releases/download/${TAG}/cymbal_${TAG}_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              elsif Hardware::CPU.intel?
                url "https://github.com/1broseidon/cymbal/releases/download/${TAG}/cymbal_${TAG}_darwin_x86_64.tar.gz"
                sha256 "${SHA_DARWIN_X86}"
              end

              define_method(:install) do
                bin.install "cymbal"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/1broseidon/cymbal/releases/download/${TAG}/cymbal_${TAG}_linux_x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              elsif Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/1broseidon/cymbal/releases/download/${TAG}/cymbal_${TAG}_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end

              define_method(:install) do
                bin.install "cymbal"
              end
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/cymbal.rb

          # Push to homebrew-tap
          cd /tmp
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/1broseidon/homebrew-tap.git"
          cp cymbal.rb homebrew-tap/Formula/cymbal.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cymbal.rb
          git commit -m "formula: update cymbal to ${TAG}" || true
          git push

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/1broseidon/cymbal:${{ steps.ref.outputs.tag }}
            ghcr.io/1broseidon/cymbal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
