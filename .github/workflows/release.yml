name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Create zig cc/cxx wrapper scripts
        run: |
          mkdir -p "$HOME/.local/bin"

          targets=(
            "darwin-amd64:x86_64-macos"
            "darwin-arm64:aarch64-macos"
            "linux-amd64:x86_64-linux-gnu"
            "linux-arm64:aarch64-linux-gnu"
          )

          for pair in "${targets[@]}"; do
            name="${pair%%:*}"
            target="${pair##*:}"

            cat > "$HOME/.local/bin/zig-cc-${name}" << ZIGEOF
          #!/bin/sh
          exec zig cc -target ${target} "\$@"
          ZIGEOF

            cat > "$HOME/.local/bin/zig-cxx-${name}" << ZIGEOF
          #!/bin/sh
          exec zig c++ -target ${target} "\$@"
          ZIGEOF

            chmod +x "$HOME/.local/bin/zig-cc-${name}" "$HOME/.local/bin/zig-cxx-${name}"
          done

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
